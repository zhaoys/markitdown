name: Build markitdown binaries

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: markitdown
          - os: windows-latest
            name: markitdown.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "markitdown[all]" pyinstaller

      - name: Create entry script
        run: |
          echo "from markitdown.__main__ import main" > entry.py
          echo "main()" >> entry.py

      - name: Build binary
        run: pyinstaller --onefile --name markitdown --collect-all markitdown entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
